services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  node1:
    build:
      context: .
      dockerfile: core/Dockerfile
    environment:
      NEXUS_HTTP_PORT: "3001"
      NEXUS_QUIC_PORT: "9000"
      NEXUS_DATA_DIR: "/data"
      NEXUS_GATEWAY_URL: "http://gateway:3000"
      NEXUS_ADVERTISED_URL: "http://node1:3001"
      NEXUS_PEERS: "node2:9001"
      RUST_LOG: "info"
    volumes:
      - node1_data:/data
    ports:
      - "3001:3001"
    depends_on:
      gateway:
        condition: service_healthy

  node2:
    build:
      context: .
      dockerfile: core/Dockerfile
    environment:
      NEXUS_HTTP_PORT: "3002"
      NEXUS_QUIC_PORT: "9001"
      NEXUS_DATA_DIR: "/data"
      NEXUS_GATEWAY_URL: "http://gateway:3000"
      NEXUS_ADVERTISED_URL: "http://node2:3002"
      NEXUS_PEERS: "node1:9000"
      RUST_LOG: "info"
    volumes:
      - node2_data:/data
    ports:
      - "3002:3002"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  node1_data:
  node2_data:
